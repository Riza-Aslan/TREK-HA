name: "TREK"
description: >-
  A self-hosted, real-time collaborative travel planner — 
  with maps, budgets, packing lists, a journal, and AI built in.
version: "1.0.0"
slug: "trek"
url: https://github.com/mauriceboe/TREK
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
ingress: true
ingress_port: 3000
ingress_entry: /
panel_icon: mdi:airplane
panel_title: "TREK"
panel_admin: false
webui: http://[HOST]:[PORT:3000]/
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: TREK Web Interface (Ingress)
map:
  - data:rw
options:
  timezone: "Europe/Berlin"
  encryption_key: ""
schema:
  timezone: str
  encryption_key: str?
